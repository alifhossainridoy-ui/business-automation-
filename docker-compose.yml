services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      - redis

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  redis-data:
